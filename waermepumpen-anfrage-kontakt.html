<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wärmepumpen-Check | Karl Weymann GmbH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://pub-b33108412309406a9a941ddc51e9a5b9.r2.dev/Weymann-Geb%C3%A4udetechnik/Weymann_GmbH_Flavorcon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .kontakt-flow-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8rem 2rem 4rem;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #050814 100%);
            position: relative;
        }
        
        .kontakt-bg-pattern {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            pointer-events: none;
        }

        .kontakt-box {
            background: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
            max-width: 550px;
            width: 100%;
            padding: 3.5rem;
            position: relative;
            z-index: 2;
            text-align: left;
        }

        .kontakt-box-header {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .kontakt-box h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }

        .kontakt-box p {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.5;
        }

        .flow-form .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .flow-form label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--primary-color);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .flow-form .form-control {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 2px solid transparent;
            background-color: var(--bg-light);
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: 1rem;
            transition: var(--transition);
        }

        .flow-form .form-control:focus {
            outline: none;
            border-color: var(--secondary-color);
            background-color: #ffffff;
            box-shadow: 0 10px 20px rgba(210, 30, 38, 0.05);
        }

        .flow-form textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }

        .flow-btn {
            width: 100%;
            padding: 1.2rem;
            font-size: 1.1rem;
            border-radius: var(--radius-md);
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 10px 25px rgba(210, 30, 38, 0.4);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="https://pub-b33108412309406a9a941ddc51e9a5b9.r2.dev/Weymann-Geb%C3%A4udetechnik/Weymann_logo_transparent.png" alt="Karl Weymann GmbH Logo" style="height: 45px;">
            </a>
            
            <nav class="nav-menu">
                <a href="waermepumpen-anfrage.html" class="nav-link">&larr; Zurück zur Übersicht</a>
            </nav>
        </div>
    </header>

    <!-- Form Section -->
    <section class="kontakt-flow-section">
        <div class="kontakt-bg-pattern"></div>
        
        <div class="kontakt-box">
            <div class="kontakt-box-header">
                <span style="display:inline-block; padding:0.4rem 1rem; background:rgba(255,204,0,0.15); color:#d1a700; font-weight:700; text-transform:uppercase; letter-spacing:1px; font-size:0.85rem; border-radius:50px; margin-bottom:1rem;">Kostenlos & Unverbindlich</span>
                <h1>Wärmepumpen-Check</h1>
                <p>Hinterlassen Sie uns Ihre Daten. Wir melden uns umgehend bei Ihnen, um die Möglichkeiten für Ihr Haus zu besprechen.</p>
            </div>

            <form class="flow-form" action="#" method="POST">
                <div class="form-group">
                    <label>Ihr Name</label>
                    <input type="text" class="form-control" placeholder="Max Mustermann" required>
                </div>
                
                <div class="form-group">
                    <label>E-Mail Adresse</label>
                    <input type="email" class="form-control" placeholder="mail@beispiel.de" required>
                </div>

                <div class="form-group">
                    <label>Telefonnummer</label>
                    <input type="tel" class="form-control" placeholder="Für Rückfragen" required>
                </div>

                <div class="form-group">
                    <label>Anmerkungen / Wünsche (Optional)</label>
                    <textarea class="form-control" placeholder="z.B. Baujahr des Hauses, aktuelle Heizung..."></textarea>
                </div>

                <button type="submit" class="btn btn-secondary flow-btn">
                    Check jetzt anfragen
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
                
                <p style="text-align:center; font-size:0.85rem; color:var(--text-muted); margin-top:1.5rem;">
                    Ihre Daten werden sicher und vertraulich behandelt.
                </p>
            </form>
        </div>
    </section>

    <!-- Minimal Footer -->
    <footer style="background: var(--bg-dark); border-top: 1px solid rgba(255,255,255,0.05); padding: 2rem 0; text-align: center;">
        <div class="container">
            <div style="display:flex; justify-content:center; gap:2rem; font-size:0.9rem; color:rgba(255,255,255,0.6);">
                <a href="#">Impressum</a>
                <a href="#">Datenschutz</a>
            </div>
        </div>
    </footer>

</body>
</html>
